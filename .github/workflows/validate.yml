name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  repository:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate skill and scripts
        shell: pwsh
        run: ./tools/validate.ps1

      - name: Verify npx skill discovery
        run: npx --yes skills add . --list
